source: '../../depot/box2d/include/box2d/id.h'
target: 'src/id_py_auto.cpp'

specs:
  # 'function_prototype@b2OverlapResultFcn':
  #   facade:
  #     kind: callback
  #     context_param: context

  'struct@b2WorldId':
    pyname: World
    extra:
      methods:
        __init__:
          use: function@b2CreateWorld
        draw:
          use: function@World_Draw

  'struct@b2BodyId':
    pyname: Body
    extra:
      properties:
        user_data:
          setter: "Body_SetUserData"
          getter: "Body_GetUserData"
        position:
          getter: "b2Body_GetPosition"
        rotation:
          getter: "b2Body_GetRotation"
        angle:
          getter: "Body_GetAngle"

  'struct@b2ShapeId':
    pyname: Shape
    extra:
      properties:
        body:
          getter: b2Shape_GetBody
        friction:
          setter: "b2Shape_SetFriction"
          getter: "b2Shape_GetFriction"        
        restitution:
          setter: "b2Shape_SetRestitution"
          getter: "b2Shape_GetRestitution"        

transforms:
  - name: mogrify
    target: struct@b2WorldId

  - name: mogrify
    target: struct@b2BodyId

  - name: mogrify
    target: struct@b2ShapeId