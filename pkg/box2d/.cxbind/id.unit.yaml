source: '../../depot/box2d/include/box2d/id.h'
target: 'src/id_py_auto.cpp'

specs:
  'struct@b2WorldId':
    pyname: World
    extra:
      methods:
        __init__:
          use: b2CreateWorld

  'struct@b2BodyId':
    pyname: Body
    extra:
      properties:
        user_data:
          setter: "Body_SetUserData"
          getter: "Body_GetUserData"
        position:
          getter: "b2Body_GetPosition"
        rotation:
          getter: "b2Body_GetRotation"

  'struct@b2ShapeId':
    pyname: Shape
    extra:
      properties:
        friction:
          setter: "b2Shape_SetFriction"
          getter: "b2Shape_GetFriction"        
        restitution:
          setter: "b2Shape_SetRestitution"
          getter: "b2Shape_GetRestitution"        

transforms:
  - name: mogrify
    target: struct@b2WorldId

  - name: mogrify
    target: struct@b2BodyId

  - name: mogrify
    target: struct@b2ShapeId