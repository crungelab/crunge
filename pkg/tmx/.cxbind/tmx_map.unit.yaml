source: '../../depot/tmxlite/tmxlite/include/tmxlite/Map.hpp'
target: 'src/tmx_map_py_auto.cpp'

excludes:
  - 'method@tmx::Map::getLayers'

specs:
  'class@tmx::Map':
    extra:
      properties:
        - name: "tilesets"
          getter: "tmx::Map::getTilesets"

        - name: "tile_size"
          getter: "tmx::Map::getTileSize"

        - name: "tile_count"
          getter: "tmx::Map::getTileCount"