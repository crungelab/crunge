source: '../../depot/tmxlite/tmxlite/include/tmxlite/Tileset.hpp'
target: 'src/tmx_tileset_py_auto.cpp'

excludes:
  - 'method@tmx::Tileset::parse'
  - 'field@tmx::Tileset::Tile::properties'

specs:
  'class@tmx::Tileset':
    extra:
      properties:
        - name: "name"
          getter: "tmx::Tileset::getName"

        - name: "tiles"
          getter: "tmx::Tileset::getTiles"
