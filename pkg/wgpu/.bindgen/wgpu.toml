source = '../../lib/dawn/include/dawn/webgpu_cpp.h'
target = 'src/crunge/wgpu/bindings/generated.cpp'

module = '_wgpu'

flags = [
    '-x', 'c++',
    '-std=c++17',
    '-I../../lib/dawn/include',
    '-I../../depot/dawn/include',
]


# Internal / Ignored

[struct.'dawn::IsDawnBitmask'] #TODO: Should skip templates in the transpiler
    exclude = true

# These three have a weird signature:  const char* const * 
[field.'wgpu::DawnInstanceDescriptor::additionalRuntimeSearchPaths']
    exclude = true

[field.'wgpu::DawnTogglesDeviceDescriptor::forceEnabledToggles']
    exclude = true

[field.'wgpu::DawnTogglesDeviceDescriptor::forceDisabledToggles']
    exclude = true
