[tool.poetry]
name = "impyodemo"
version = "0.1.0"
description = "Creative coding extensions"
authors = ["Kurtis Fields <kurtisfields@gmail.com>"]

[tool.poetry.dependencies]
python = ">=3.8,<3.12"
#pyo = "^1.0.4"
pyo = {git = "https://github.com/belangeo/pyo.git"}
arcade = "^2.6.16"
numpy = "^1.24.1"
crunge-imgui = {path = "../imgui",  develop = true}
crunge-implot = {path = "../implot",  develop = true}
mido = "^1.2.10"

[tool.poetry.dev-dependencies]
pytest = "^7.2.0"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
