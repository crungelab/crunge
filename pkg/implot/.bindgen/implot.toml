source = '../../depot/implot/implot.h'
target = 'src/crunge/implot/bindings/generated.cpp'

prefix = 'ImPlot'
short_prefix = 'Im'

module = '_implot'

flags = [
    '-x', 'c++',
    '-std=c++17',
    '-DIMGUI_DISABLE_OBSOLETE_FUNCTIONS=1',
    '-DIMPLOT_DISABLE_OBSOLETE_FUNCTIONS=1',
    '-I../../depot/imgui'
]

# Wrapped

[function.'ImPlot::CreateContext']
    exclude = true

[function.'ImPlot::DestroyContext']
    exclude = true

[function.'ImPlot::GetCurrentContext']
    exclude = true

[function.'ImPlot::SetCurrentContext']
    exclude = true

# Internal / Ignored

[function.'ImPlot::PixelsToPlot']
    exclude = true

[function.'ImPlot::SetNextPlotTicksX']
    exclude = true

[function.'ImPlot::SetNextPlotTicksY']
    exclude = true

[function.'ImPlot::SetupAxisTicks'] #TODO: need to wrap this
    exclude = true

[method.'ImPlotRect::Contains'] #TODO: overload problems
    exclude = true
